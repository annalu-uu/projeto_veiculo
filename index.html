<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto Veículos</title>

    <script src="js/script_veiculo.js" defer></script>
    <link rel="stylesheet" href="css/style_veiculo.css">

</head>
<body>

    <div id="geral">
        <h1>Cadastro de Veículos</h1>

        <div id="div-form-veiculos">
           <form id="form-veiculos">
            
            <label for="modelo">Modelo</label>
            <input type="text" name="modelo" id="modelo">

            <label for="marca">Marca</label>
            <input type="text" name="marca" id="marca">

            <label for="placa">Placa</label>
            <input type="text" name="placa" id="placa">

            <label for="ano">Ano de fabricação</label>
            <input type="text" name="ano" id="ano">

            <label for="valor-mercado">Valor de mercado</label>
            <input type="text" name="valor-mercado" id="valor-mercado">


            <label for="combustivel">Tipo de combustivel</label>
            <select id="combustivel" name="combustivel">
                <option value="gasolina">Gasolina</option>
                <option value="salvador">Etanol</option>
                <option value="biocombustivel">Biocombustível</option>
                <option value="hibrido">Híbrido</option>
                <option value="eletrico">Elético</option>
              </select>

            <button type="submit" id="btn-add">Enviar</button>
            <button type="reset" id="btn-limpar">Limpar</button>
           </form> 
        </div>

        <div id="div-lista-veiculos"></div>

    </div>

</body>

</html>
